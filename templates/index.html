<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Tic Tac Toe</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
}

h1 {
    margin-top: 20px;
    font-size: 40px;
}

.container {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    margin-top: 30px;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 15px;
}

.cell {
    width: 110px;
    height: 110px;
    font-size: 40px;
    font-weight: bold;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: 0.3s;
}

.cell:hover {
    transform: scale(1.08);
}

.winner {
    background: #00ffcc !important;
    color: black;
}

.status {
    margin-top: 20px;
    font-size: 20px;
}

.btn {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
}

.toggle {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>

<div class="container">
    <div class="board" id="board"></div>

    <div class="status" id="status">Player X Turn</div>

    <button class="btn" onclick="resetGame()">Restart</button>
    <button class="btn" onclick="toggleMode()">Switch Mode</button>

    <div class="toggle" id="mode">Mode: Player vs Player</div>
</div>

<!-- Sounds -->
<audio id="clickSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/applause-8.wav"></audio>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let isAI = false;

const winPatterns = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

function renderBoard() {
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";

    board.forEach((cell, index) => {
        const btn = document.createElement("button");
        btn.classList.add("cell");
        btn.innerText = cell;

        btn.onclick = () => makeMove(index);

        boardDiv.appendChild(btn);
    });
}

function makeMove(index) {
    if(board[index] !== "") return;

    document.getElementById("clickSound").play();

    board[index] = currentPlayer;

    if(checkWinner()) {
        document.getElementById("status").innerText = `🎉 ${currentPlayer} Wins!`;
        highlightWinner();
        document.getElementById("winSound").play();
        return;
    }

    if(!board.includes("")) {
        document.getElementById("status").innerText = "Draw!";
        return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    document.getElementById("status").innerText = `Player ${currentPlayer} Turn`;

    renderBoard();

    if(isAI && currentPlayer === "O") {
        setTimeout(aiMove, 500);
    }
}

function aiMove() {
    let empty = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
    let move = empty[Math.floor(Math.random() * empty.length)];
    makeMove(move);
}

function checkWinner() {
    return winPatterns.some(pattern => {
        const [a,b,c] = pattern;
        return board[a] && board[a] === board[b] && board[a] === board[c];
    });
}

function highlightWinner() {
    const cells = document.querySelectorAll(".cell");

    winPatterns.forEach(pattern => {
        const [a,b,c] = pattern;
        if(board[a] && board[a] === board[b] && board[a] === board[c]) {
            cells[a].classList.add("winner");
            cells[b].classList.add("winner");
            cells[c].classList.add("winner");
        }
    });
}

function resetGame() {
    board = ["","","","","","","","",""];
    currentPlayer = "X";
    document.getElementById("status").innerText = "Player X Turn";
    renderBoard();
}

function toggleMode() {
    isAI = !isAI;
    document.getElementById("mode").innerText =
        isAI ? "Mode: Player vs AI 🤖" : "Mode: Player vs Player";
    resetGame();
}

renderBoard();
</script>

</body>
</html>
